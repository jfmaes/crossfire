server {
    listen 80;

    # Serve the Vite-built frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API and SSE requests to the daemon
    location /sessions {
        proxy_pass http://daemon:8787;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://daemon:8787;
        proxy_set_header Host $host;
    }

    location /artifacts {
        proxy_pass http://daemon:8787;
        proxy_set_header Host $host;
    }

    location /progress {
        proxy_pass http://daemon:8787;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }
}
